<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background styling and filters -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32" />
      <stop offset="100%" stop-color="#1B5E20" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81C784" />
      <stop offset="100%" stop-color="#4CAF50" />
    </linearGradient>
    <linearGradient id="securityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E53935" />
      <stop offset="100%" stop-color="#B71C1C" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#F8FAF8" rx="16" />

  <!-- Flow Lines (Dashed Connections) -->
  <g stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4" fill="none">
    <!-- User to Orchestrator -->
    <path d="M 400 90 L 400 160" />
    
    <!-- Orchestrator to sub-agents (fan out) -->
    <path d="M 400 220 C 400 240, 150 240, 150 270" />
    <path d="M 400 220 C 400 240, 316 240, 316 270" />
    <path d="M 400 220 C 400 240, 483 240, 483 270" />
    <path d="M 400 220 C 400 240, 650 240, 650 270" />

    <!-- Sub-agents to Security (fan in) -->
    <path d="M 150 330 C 150 360, 400 360, 400 390" />
    <path d="M 316 330 C 316 360, 400 360, 400 390" />
    <path d="M 483 330 C 483 360, 400 360, 400 390" />
    <path d="M 650 330 C 650 360, 400 360, 400 390" />

    <!-- Security to Output -->
    <path d="M 400 450 L 400 510" />
  </g>

  <!-- Nodes (Cards) -->
  <!-- 1. Farmer Input -->
  <g transform="translate(290, 30)" filter="url(#shadow)">
    <rect width="220" height="60" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="110" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#334155" text-anchor="middle">Farmer Input Telemetry</text>
  </g>

  <!-- 2. Central Orchestrator -->
  <g transform="translate(290, 160)" filter="url(#shadow)">
    <rect width="220" height="60" rx="12" fill="url(#primaryGrad)" />
    <text x="110" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Orchestrator Agent</text>
  </g>

  <!-- 3. Sub-Agents -->
  <!-- Disease Agent -->
  <g transform="translate(50, 270)" filter="url(#shadow)">
    <rect width="130" height="60" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="65" y="35" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Disease Agent</text>
  </g>

  <!-- Weather Agent -->
  <g transform="translate(216, 270)" filter="url(#shadow)">
    <rect width="130" height="60" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="65" y="35" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Weather Agent</text>
  </g>

  <!-- Market Agent -->
  <g transform="translate(383, 270)" filter="url(#shadow)">
    <rect width="130" height="60" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="65" y="35" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Market Agent</text>
  </g>

  <!-- Scheme Agent -->
  <g transform="translate(550, 270)" filter="url(#shadow)">
    <rect width="130" height="60" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
    <text x="65" y="35" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#1e293b" text-anchor="middle">Scheme Agent</text>
  </g>

  <!-- 4. Security Guardrails -->
  <g transform="translate(290, 390)" filter="url(#shadow)">
    <rect width="220" height="60" rx="12" fill="url(#securityGrad)" />
    <text x="110" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Security Compliance Agent</text>
  </g>

  <!-- 5. Integrated Output -->
  <g transform="translate(290, 510)" filter="url(#shadow)">
    <rect width="220" height="60" rx="12" fill="url(#accentGrad)" />
    <text x="110" y="36" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Action Plan Output</text>
  </g>
</svg>
